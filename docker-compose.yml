services:

  # ─────────────────────────────────────────
  # Open WebUI（チャットUI + Gemini API接続）
  # ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mcp-training-webui
    ports:
      - "3000:8080"
    environment:
      # 管理者設定
      - WEBUI_SECRET_KEY=mcp-training-secret
      # Gemini APIキーはGUI（Settings→Connections）から設定する
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - mcpo
    networks:
      - mcp-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # mcpo（MCP → HTTP/OpenAPI プロキシ）
  # ─────────────────────────────────────────
  mcpo:
    build:
      context: ./docker/mcpo
      dockerfile: Dockerfile
    container_name: mcp-training-mcpo
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo-config.json:/app/config.json:ro
      - ./workspace:/workspace
    depends_on:
      sqlite-mcp:
        condition: service_healthy
    networks:
      - mcp-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # filesystem-mcp（ファイルシステム操作MCP）
  # ─────────────────────────────────────────
  filesystem-mcp:
    build:
      context: ./docker/filesystem
      dockerfile: Dockerfile
    container_name: mcp-training-filesystem
    volumes:
      - ./workspace:/workspace
    networks:
      - mcp-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # sqlite-mcp（DB初期化専用コンテナ）
  # 起動時に training.db が未存在なら init-db.sql から自動初期化
  # ─────────────────────────────────────────
  sqlite-mcp:
    build:
      context: ./docker/sqlite
      dockerfile: Dockerfile
    container_name: mcp-training-sqlite
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/db/training.db"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - mcp-net
    restart: unless-stopped

networks:
  mcp-net:
    driver: bridge

volumes:
  open-webui-data:
