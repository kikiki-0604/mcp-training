services:

  # ─────────────────────────────────────────
  # Open WebUI（チャットUI + Gemini API接続）
  # ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mcp-training-webui
    ports:
      - "3000:8080"
    environment:
      # Gemini APIキー（.envファイルから読み込む）
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      # OpenAI互換エンドポイントは無効化
      - OPENAI_API_KEY=disabled
      # 管理者設定
      - WEBUI_SECRET_KEY=mcp-training-secret
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - mcpo
    restart: unless-stopped

  # ─────────────────────────────────────────
  # mcpo（MCP → HTTP/OpenAPI プロキシ）
  # ghcr.io/open-webui/mcpo:main を拡張して
  # Node.js + MCP サーバーパッケージを追加
  # ─────────────────────────────────────────
  mcpo:
    build:
      context: ./docker/mcpo
      dockerfile: Dockerfile
    container_name: mcp-training-mcpo
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo-config.json:/app/config.json:ro
      - ./workspace:/workspace
    depends_on:
      sqlite-mcp:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # filesystem-mcp（ファイルシステム操作MCP）
  # workspace/ 以下のファイルを MCP で操作可能にする
  # ─────────────────────────────────────────
  filesystem-mcp:
    build:
      context: ./docker/filesystem
      dockerfile: Dockerfile
    container_name: mcp-training-filesystem
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped

  # ─────────────────────────────────────────
  # sqlite-mcp（SQLite操作MCP + DB初期化）
  # 起動時に training.db が未存在なら init-db.sql から自動初期化
  # ─────────────────────────────────────────
  sqlite-mcp:
    build:
      context: ./docker/sqlite
      dockerfile: Dockerfile
    container_name: mcp-training-sqlite
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/db/training.db"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  open-webui-data:
